version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: smarthire_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-smart_hire}
    ports:
      - "3306:3306"
    volumes:
      - smarthire_mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarthire_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=database
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-smart_hire}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      # The rest of the keys (JWT, Email, Gemini, GitHub) should be passed via a .env file or host environment
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../smarthire-app
      dockerfile: Dockerfile
      args:
        # In build phase, the frontend needs to know where the API is so it can bake it into the client logic
        # For production deployment with a domain (e.g. smarthire.com), this would be https://api.smarthire.com/api/v1
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
        - NEXT_PUBLIC_GITHUB_CLIENT_ID=${NEXT_PUBLIC_GITHUB_CLIENT_ID}
    container_name: smarthire_frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  smarthire_mysql_data:
