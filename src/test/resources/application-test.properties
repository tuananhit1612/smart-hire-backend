spring.datasource.url=jdbc:h2:mem:smarthire_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=
spring.jpa.open-in-view=false

app.jwt.secret=test-secret-key-with-enough-length-for-jwt-signing
app.frontend.url=http://localhost:3000
app.cors.allowed-origins=http://localhost:3000
app.storage.upload-dir=./target/test-uploads
app.seed.enabled=false

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
