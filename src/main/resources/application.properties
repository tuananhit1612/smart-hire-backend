spring.application.name=smart-hire-backend
server.port=8080

# ── MySQL ──
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/smart_hire?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──
app.jwt.secret=SmartHireSecretKey2026ForJWTTokenGenerationMustBe256BitsLong!!
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ── File Storage ──
app.storage.upload-dir=./uploads
app.storage.max-file-size=5242880
app.storage.allowed-image-types=image/jpeg,image/png,image/gif,image/webp
app.storage.allowed-document-types=application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document

# ── Multipart ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Mail (Gmail SMTP) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:smarthire.noreply@gmail.com}
spring.mail.password=${MAIL_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from-name=SmartHire
app.mail.from-address=${MAIL_USERNAME:smarthire.noreply@gmail.com}
