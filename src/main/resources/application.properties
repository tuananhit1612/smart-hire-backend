spring.application.name=smart-hire-backend
server.port=8080

# ── MySQL ──
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/smart_hire?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──
app.jwt.secret=SmartHireSecretKey2026ForJWTTokenGenerationMustBe256BitsLong!!
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000
