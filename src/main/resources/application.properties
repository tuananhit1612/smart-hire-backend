spring.application.name=smart-hire-backend
server.port=8080

# ── MySQL ──
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:smart_hire}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# ── File Storage ──
app.storage.upload-dir=./uploads
app.storage.max-file-size=5242880
app.storage.allowed-image-types=image/jpeg,image/png,image/gif,image/webp
app.storage.allowed-document-types=application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document

# ── Multipart ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Mail (Gmail SMTP) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from-name=SmartHire
app.mail.from-address=${MAIL_USERNAME:smarthire.noreply@gmail.com}

# ── Frontend ──
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ── Jackson / JSON ──
# Note: write-dates-as-timestamps removed — not supported in Jackson 3.x (Spring Boot 4.x)
# Jackson 3.x defaults to ISO-8601 string format for dates automatically
spring.jackson.deserialization.fail-on-unknown-properties=false

# ── Gemini AI ──
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# ── GitHub OAuth ──
github.client-id=${GITHUB_CLIENT_ID:}
github.client-secret=${GITHUB_CLIENT_SECRET:}
# ── FPT AI ID Recognition ──
fpt.ai.api-key=${FPT_AI_API_KEY:YOUR_FPT_API_KEY_HERE}
fpt.ai.idr-url=https://api.fpt.ai/vision/idr/vnm

app.seed.enabled=false
